<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>룰렛</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
      padding: 30px;
    }

    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .wheel-wrapper {
      position: relative;
      width: 480px;
      height: 480px;
    }

    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 30px solid #ff4757;
      filter: drop-shadow(0 2px 6px rgba(255,71,87,0.8));
      z-index: 10;
    }

    canvas {
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(255,255,255,0.1);
    }

    #startBtn {
      padding: 14px 60px;
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,71,87,0.5);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #startBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(255,71,87,0.7);
    }
    #startBtn:active:not(:disabled) { transform: translateY(0); }
    #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    #resultMsg {
      font-size: 22px;
      font-weight: bold;
      color: #ffd700;
      min-height: 32px;
      text-align: center;
      text-shadow: 0 0 12px rgba(255,215,0,0.6);
    }

    .list-section {
      width: 220px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 560px;
    }

    .list-section h2 {
      font-size: 16px;
      color: #aaa;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
    }

    #selectedList {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #selectedList li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.07);
      border-radius: 8px;
      font-size: 15px;
      animation: fadeIn 0.4s ease;
    }
    #selectedList li .num {
      font-size: 12px;
      color: #888;
      min-width: 22px;
    }
    #selectedList li.latest {
      background: rgba(255,71,87,0.25);
      border: 1px solid rgba(255,71,87,0.5);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    #completeMsg {
      display: none;
      font-size: 15px;
      color: #7bed9f;
      text-align: center;
      padding: 10px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

<div class="wheel-section">
  <div class="wheel-wrapper">
    <div class="pointer"></div>
    <canvas id="wheel" width="480" height="480"></canvas>
  </div>
  <div id="resultMsg"></div>
  <button id="startBtn">START</button>
</div>

<div class="list-section">
  <h2>선택 순서</h2>
  <ul id="selectedList"></ul>
  <div id="completeMsg">🎉 모두 선택 완료!</div>
</div>

<script>
  const NAMES = [
    "정예한","정우희","조소은","최예빈","태은수",
    "성아윤","서아윤","서이준","윤유찬","임윤우",
    "이도현","이하림","이현우","정서율","강가희",
    "고예준","권명진","김동욱","김보혜","김서윤",
    "김예린","김하선","박서하"
  ];

  const COLORS = [
    "#ff6b6b","#ffa94d","#ffd43b","#a9e34b","#4dabf7",
    "#748ffc","#da77f2","#f783ac","#63e6be","#74c0fc",
    "#ff8787","#ffb347","#ffe066","#c0eb75","#66d9e8",
    "#91a7ff","#e599f7","#f0a6b2","#38d9a9","#4fc3f7",
    "#ff922b","#7950f2","#20c997"
  ];

  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const startBtn = document.getElementById('startBtn');
  const resultMsg = document.getElementById('resultMsg');
  const selectedList = document.getElementById('selectedList');
  const completeMsg = document.getElementById('completeMsg');

  let remaining = [...NAMES];
  let colorMap = {};
  NAMES.forEach((name, i) => { colorMap[name] = COLORS[i % COLORS.length]; });

  let rotation = 0;
  let spinning = false;
  let animId = null;

  function drawWheel() {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const r = cx - 4;
    const n = remaining.length;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (n === 0) return;

    const sliceAngle = (2 * Math.PI) / n;

    for (let i = 0; i < n; i++) {
      const start = rotation + i * sliceAngle;
      const end = start + sliceAngle;

      // Slice
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.closePath();
      ctx.fillStyle = colorMap[remaining[i]];
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Text
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(start + sliceAngle / 2);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#fff';
      const fontSize = n <= 10 ? 16 : n <= 16 ? 13 : 11;
      ctx.font = `bold ${fontSize}px 'Apple SD Gothic Neo', sans-serif`;
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur = 3;
      const textR = r * 0.82;
      ctx.fillText(remaining[i], textR, fontSize / 3);
      ctx.restore();
    }

    // Center circle
    ctx.beginPath();
    ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function getSelected() {
    const n = remaining.length;
    const sliceAngle = (2 * Math.PI) / n;
    // Pointer is at top = -PI/2. Normalize rotation to find which slice is at top.
    const pointerAngle = -Math.PI / 2;
    // Normalize: find angle relative to rotation
    let angle = ((pointerAngle - rotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
    const idx = Math.floor(angle / sliceAngle) % n;
    return idx;
  }

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function spin() {
    if (spinning || remaining.length === 0) return;
    spinning = true;
    startBtn.disabled = true;
    resultMsg.textContent = '';

    // Remove 'latest' from previous
    const prev = selectedList.querySelector('.latest');
    if (prev) prev.classList.remove('latest');

    const totalRotation = (5 + Math.random() * 5) * 2 * Math.PI; // 5~10 full turns
    const duration = 3500 + Math.random() * 1000;
    const startTime = performance.now();
    const startRotation = rotation;

    function frame(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      rotation = startRotation + totalRotation * easeOut(t);
      drawWheel();

      if (t < 1) {
        animId = requestAnimationFrame(frame);
      } else {
        rotation = startRotation + totalRotation;
        drawWheel();
        spinning = false;

        const idx = getSelected();
        const winner = remaining[idx];
        remaining.splice(idx, 1);

        // Show result
        resultMsg.textContent = `🎉 ${winner}`;

        // Add to list
        const li = document.createElement('li');
        li.classList.add('latest');
        li.innerHTML = `<span class="num">${selectedList.children.length + 1}.</span>${winner}`;
        selectedList.appendChild(li);
        selectedList.scrollTop = selectedList.scrollHeight;

        if (remaining.length === 0) {
          startBtn.disabled = true;
          startBtn.textContent = '완료';
          completeMsg.style.display = 'block';
        } else {
          startBtn.disabled = false;
          drawWheel();
        }
      }
    }

    animId = requestAnimationFrame(frame);
  }

  startBtn.addEventListener('click', spin);
  drawWheel();
</script>
</body>
</html>
